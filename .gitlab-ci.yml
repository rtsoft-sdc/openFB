# ═══════════════════════════════════════════════════════════════════════════════
# .gitlab-ci.yml — сборка .deb и .whl пакета openFB
# Runner: shell (с установленным Docker)
# ═══════════════════════════════════════════════════════════════════════════════

stages:
  - build

variables:
  CI_REGISTRY_IMAGE: $CI_REGISTRY/$CI_PROJECT_NAME
  BUILDER_IMAGE: $CI_REGISTRY_IMAGE/builder:latest
  CONTAINER_PREFIX: "openfb-build"
  BUILD_TIMEOUT: 900
  
build:
  stage: build
  tags: [ubuntu_docker]
  when: manual
  resource_group: openfb-builder
  before_script:
    # Валидация переменных
    - |
        if [ -z "$BUILDER_IMAGE" ]; then
          echo "Error: BUILDER_IMAGE is not set. Exiting."
          exit 1
        fi

    # извлекаем версию из pyproject.toml, чтобы передать её в контейнер для сборки пакетов
    - PACKAGE_VERSION=$(uv version | awk '{print $2}')
    # если образ ещё не собран (первый запуск, не было изменений в Dockerfile.build)
    - docker image inspect ${BUILDER_IMAGE} >/dev/null 2>&1 ||
        docker build -t ${BUILDER_IMAGE} -f deb-packaging/Dockerfile.build .
  script:
    - |
      timeout "$BUILD_TIMEOUT" docker run --rm \
        --name "${CONTAINER_PREFIX}-${CI_JOB_ID}" \
        -v "$PWD":/build \
        -w /build \
        -e PACKAGE_VERSION="${PACKAGE_VERSION}" \
        -e HOST_UID=$(id -u) \
        -e HOST_GID=$(id -g) \
        ${BUILDER_IMAGE} \
        bash deb-packaging/scripts/build-package.sh

      EXIT_CODE=$?
      if [ $EXIT_CODE -ne 0 ]; then
        echo "Container exited with code $EXIT_CODE"
        echo "This means the build inside failed or timed out."
        exit $EXIT_CODE
      else
        echo "Container completed successfully"
      fi

  after_script:
    #Очистка docker контейнеров из системы, чтобы не засоряли жизненное пространство
    - |
        echo "Cleaning up any existing containers with prefix $CONTAINER_PREFIX..."
        OLD_CONTAINERS=$(docker ps -aq --filter "name=${CONTAINER_PREFIX}-")
        if [ -n "$OLD_CONTAINERS" ]; then
          echo "Found containers to clean: $OLD_CONTAINERS"
          echo "Stopping containers..."          
          echo "Removing containers..."
          docker rm -f $OLD_CONTAINERS 2>/dev/null || true
          STILL_EXISTING=$(docker ps -aq --filter "name=^${CONTAINER_PREFIX}-")
          if [ -n "$STILL_EXISTING" ]; then
            echo "ERROR: Containers still exist after force remove!"
            exit 1
          fi
        else
          echo "No containers found to clean."
        fi

  artifacts:
    paths:
      - "*.deb"
      - "*.whl"
    expire_in: 1 week
  rules:
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      changes:
        - pyproject.toml
      when: on_success
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - pyproject.toml
      when: on_success
    - if: '$CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
      when: manual
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
    - if: '$CI_COMMIT_TAG'
      when: manual
