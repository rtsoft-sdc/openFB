name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync

      - name: Build
        run: |
          export PACKAGE_VERSION=$(uv version | awk '{print $2}')
          chmod +x deb-packaging/scripts/build-package.sh
          deb-packaging/scripts/build-package.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: packages
          path: |
            ./*.deb
            ./*.whl
          overwrite: 'true'

      - name: Generate release tag
        id: tag
        run: |
          if [ -n "${{ github.ref_name }}" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Release ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./*.deb
            ./*.whl
