[pytest]
# Конфигурация pytest для OpenFB функциональных блоков

# Минимальная версия Python
minversion = 3.7

# Директории с тестами
testpaths = tests

# Обнаружение файлов тестов
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Опции по умолчанию
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Маркеры для категоризации тестов
markers =
    unit: Unit-тесты для отдельных блоков
    integration: Интеграционные тесты для комбинаций блоков
    event: Тесты для event функциональных блоков
    convert: Тесты для convert функциональных блоков
    iec61131: Тесты для IEC 61131 функций
    utils: Тесты для утилит
    slow: Медленные тесты (в основном работающие с таймерами)
    timer: Тесты, зависящие от таймеров
    requires_module: Требует специального модуля для работы
    skip_ci: Пропустить в CI среде

# Логирование
log_cli = false
log_cli_level = INFO
log_file = tests/pytest.log
log_file_level = DEBUG

# Покрытие кода (если установлен pytest-cov)
# addopts = --cov=openfb --cov-report=term-missing

# Таймаут (если установлен pytest-timeout)
# timeout = 10
# timeout_method = thread
